[platformio]
default_envs = m5stack-sticks3

[common]
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.4
    crankyoldgit/IRremoteESP8266@^2.8.6
    kosme/arduinoFFT@^2.0.2
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.0
    links2004/WebSockets@^2.4.1

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = partitions_8MB_huge.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
monitor_speed = 115200
upload_protocol = espota
; Set your board IP here, or pass --upload-port <IP> on the command line.
upload_port = 192.168.1.100
; Set your serial port here if you use monitor often.
; monitor_port = COM6
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    ${common.lib_deps}

[env:m5stack-sticks3-release]
extends = env:m5stack-sticks3
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=0
