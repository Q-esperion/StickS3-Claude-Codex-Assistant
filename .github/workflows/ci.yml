name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Test helper scripts
        run: |
          python helper\version_sync.py --check
          python -m unittest discover -s tests
          python -m py_compile helper\type_server.py helper\update_check.py helper\publish_release.py helper\release_tools.py helper\prepare_release.py helper\status_logic.py helper\version_info.py helper\version_sync.py

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PlatformIO
        run: python -m pip install -U platformio
      - name: Build release firmware
        run: python -m platformio run -d . -e m5stack-sticks3-release

  helper:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install helper build deps
        run: python -m pip install -r helper\requirements.txt
      - name: Build helper exe
        working-directory: helper
        run: python -m PyInstaller StickS3Helper.spec
